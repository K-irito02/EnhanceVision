<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
    <!-- 左侧源件框 -->
    <rect x="2" y="6" width="7" height="12" rx="1"/>
    <!-- 左侧进度条 -->
    <line x1="4" y1="15" x2="7" y2="15"/>
    <!-- 左侧进度点（空心表示关闭） -->
    <circle cx="5.5" cy="15" r="1.5"/>
    <!-- 中间切换箭头（单向，表示不同步） -->
    <path d="M11 12h4"/>
    <path d="M13 9l3 3-3 3"/>
    <!-- 右侧结果框 -->
    <rect x="17" y="6" width="5" height="12" rx="1"/>
    <!-- 右侧进度条 -->
    <line x1="18" y1="15" x2="21" y2="15"/>
    <!-- 右侧进度点（空心表示关闭） -->
    <circle cx="19.5" cy="15" r="1.5"/>
</svg>
